<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: brand red with tighter corner radius for crispness at small sizes -->
  <rect width="64" height="64" rx="14" fill="#C0392B"/>
  <!-- Subtle inner highlight for depth -->
  <rect width="64" height="32" rx="14" fill="rgba(255,255,255,0.07)"/>
  <!-- Wordmark: optical-weight-adjusted, vertically centred -->
  <text x="32" y="44"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28"
        font-weight="700"
        letter-spacing="-0.5"
        text-anchor="middle"
        fill="#F5EFE7">RS</text>
</svg>
